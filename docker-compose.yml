services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: game_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d game_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  mainserver:
    build:
      context: .
      dockerfile: MainServer/Dockerfile
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ConnectionStrings__Postgres=Host=postgres;Database=game_db;Username=postgres;Password=postgres

  statsserver:
    build:
      context: .
      dockerfile: StatsServer/Dockerfile
    restart: always
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_URLS=http://*:8080
      - ConnectionStrings__Postgres=Host=postgres;Database=game_db;Username=postgres;Password=postgres
      - Redis__ConnectionString=redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  sessionserver:
    build:
      context: .
      dockerfile: SessionServer/Dockerfile
    restart: always
    ports:
      - "8082:8080"
    depends_on:
      redis:
        condition: service_started
      statsserver:
        condition: service_started
    environment:
      - Redis__ConnectionString=redis:6379
      - StatsServerUrl=http://statsserver:8080   # ← порт внутри контейнера StatsServer

volumes:
  pgdata: