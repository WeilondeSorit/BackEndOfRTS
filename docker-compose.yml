services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: game_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mainserver:
    build:
      context: .
      dockerfile: MainServer/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      - ConnectionStrings__Postgres=Host=postgres;Database=game_db;Username=postgres;Password=postgres

  statsserver:
    build:
      context: .
      dockerfile: StatsServer/Dockerfile
    ports:
      - "8081:8080"
      - "5001:5001"
    depends_on:
      - postgres
      - redis
    environment:
      - ConnectionStrings__Postgres=Host=postgres;Database=game_db;Username=postgres;Password=postgres
      - Redis__ConnectionString=redis:6379

  sessionserver:
    build:
      context: .
      dockerfile: SessionServer/Dockerfile
    ports:
      - "8082:8080"
    depends_on:
      - redis
      - statsserver
    environment:
      - Redis__ConnectionString=redis:6379
      - StatsServerUrl=http://statsserver:8082

volumes:
  pgdata: